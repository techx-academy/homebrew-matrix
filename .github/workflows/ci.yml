name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Tap local checkout
        run: brew tap techx-academy/apps "$GITHUB_WORKSPACE"
      - name: Audit cask
        run: brew audit --cask --online techx-academy/apps/matrix
      - name: Install cask
        run: brew install --cask techx-academy/apps/matrix
      - name: Verify installed app
        run: |
          test -d "/Applications/Matrix.app"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "/Applications/Matrix.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "/Applications/Matrix.app/Contents/Info.plist"
      - name: Uninstall cask
        if: always()
        run: brew uninstall --cask matrix || true
